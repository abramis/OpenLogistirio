services:
  mysql:
    image: mysql:8.4
    container_name: open-logistirio-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-open_logistirio}
      MYSQL_USER: ${MYSQL_USER:-openlog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-openlog_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: open-logistirio-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: open-logistirio-api
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-openlog}:${MYSQL_PASSWORD:-openlog_password}@mysql:3306/${MYSQL_DATABASE:-open_logistirio}
      REDIS_URL: redis://redis:6379
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4200}
      API_PORT: ${API_PORT:-3000}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - ./backups:/workspace/backups
      - api-node-modules:/workspace/node_modules
      - api-app-node-modules:/workspace/apps/api/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev -w @open-logistirio/api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: open-logistirio-web
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-4200}:4200"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
      - web-app-node-modules:/workspace/apps/web/node_modules
    depends_on:
      - api
    command: npm run dev -w @open-logistirio/web

volumes:
  mysql-data:
  redis-data:
  api-node-modules:
  api-app-node-modules:
  web-node-modules:
  web-app-node-modules:
