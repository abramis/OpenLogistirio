name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: open_logistirio_ci
          MYSQL_USER: openlog
          MYSQL_PASSWORD: openlog_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uopenlog -popenlog_password --silent"
          --health-interval 10s --health-timeout 5s --health-retries 12
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: mysql://openlog:openlog_password@127.0.0.1:3306/open_logistirio_ci
      REDIS_URL: redis://127.0.0.1:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-16-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16-characters
      FRONTEND_ORIGIN: http://localhost:4200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: npm
      - name: Install XML validation runtime
        run: sudo apt-get update && sudo apt-get install --yes libxml2-utils
      - run: npm ci
      - run: npm run prisma:generate:production --workspace=@open-logistirio/api
      - run: npm run prisma:deploy:production --workspace=@open-logistirio/api
      - run: timeout --signal=TERM --kill-after=15s 300s npm run lint --workspace=@open-logistirio/api
      - run: timeout --signal=TERM --kill-after=15s 300s npm run lint --workspace=@open-logistirio/web
      - run: timeout --signal=TERM --kill-after=15s 300s ./scripts/api-test-check.sh
      - run: timeout --signal=TERM --kill-after=15s 180s npm test --workspace=@open-logistirio/web
      - run: timeout --signal=TERM --kill-after=15s 300s npm run build --workspace=@open-logistirio/api
      - run: timeout --signal=TERM --kill-after=15s 300s npm run build --workspace=@open-logistirio/web
      - name: Reject development API URL in production bundle
        run: '! grep -R -F -q "http://localhost:3000/api" apps/web/dist/web/browser'
